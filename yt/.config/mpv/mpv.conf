# Use GPU acceleration (Intel iGPU is supported)
hwdec=auto-safe
vo=gpu

# Limit video resolution to save CPU
ytdl-format=bestvideo[vcodec^=avc1][height<=720]+bestaudio/best

# Prefer AVC1 (H.264) as it's more compatible with Intel GPU
# Skip VP9/AV1 unless you know it's smooth on your system

# Browser cookies support (for private videos/playlists)
ytdl-raw-options=cookies-from-browser=firefox

# Subtitle settings
sub-auto=fuzzy
sub-font-size=28
slang=en

# Screenshots
screenshot-directory=~/Pictures/mpv_screenshots

# Improve responsiveness and lower lag
cache=yes
demuxer-max-bytes=50MiB
demuxer-max-back-bytes=25MiB

# Performance-safe audio sync method
video-sync=audio
