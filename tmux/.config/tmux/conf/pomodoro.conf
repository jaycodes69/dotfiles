# Pomodoro Plugin Configuration

# Key bindings (you can keep them or rebind in keys.conf)
set -g @pomodoro_toggle_key 'p'       # Start / pause Pomodoro or break
set -g @pomodoro_cancel_key 'P'       # Cancel Pomodoro / break
set -g @pomodoro_skip_key '_'         # Skip Pomodoro / break
set -g @pomodoro_restart_key 'e'      # Restart Pomodoro
set -g @pomodoro_menu_key 'C-p'       # Open Pomodoro timer menu (Ctrl+p)
set -g @pomodoro_custom_key 'M-p'     # Set custom Pomodoro timer (Alt+p)

# Timer durations
set -g @pomodoro_work_duration 25     # Pomodoro work minutes
set -g @pomodoro_break_duration 5     # Short break minutes
set -g @pomodoro_long_break_duration 15  # Long break minutes
set -g @pomodoro_intervals 4          # Number of Pomodoros before a long break

# Behavior flags
set -g @pomodoro_repeat 'on'           # Auto-repeat Pomodoros (true/false)
set -g @pomodoro_disable_breaks 'off' # Disable breaks? (true/false)
set -g @pomodoro_granularity 'on'      # Show MM:SS countdown in status

# Notifications & sound
set -g @pomodoro_notifications 'on'    # Desktop notifications (notify-send required)
set -g @pomodoro_sound 'off'            # Sound on notification (off/on or sound name)
set -g @pomodoro_suppress_messages 'on' # Hide verbose plugin messages in tmux

