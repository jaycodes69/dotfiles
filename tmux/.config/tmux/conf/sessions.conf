# Alt+s to switch sessions
bind -n M-s choose-session
# Create sessions from script
bind C-c run-shell "~/.config/tmux/scripts/create-session.sh"

# Pomodoro
set -g @pomodoro_start 'p'
set -g @pomodoro_cancel 'P'
set -g @pomodoro_mins 25
set -g @pomodoro_break_mins 5
set -g @pomodoro_on " #[fg=#{@green}]●"
set -g @pomodoro_complete " #[fg=#{@yellow}]●"
set -g @pomodoro_pause " #[fg=#{@red}]■"
set -g @pomodoro_prompt_break "Break!"
set -g @pomodoro_prompt_pomodoro "Focus!"

# FZF popup
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="f"
TMUX_FZF_OPTIONS="-p -w 90% -h 38% -m"
